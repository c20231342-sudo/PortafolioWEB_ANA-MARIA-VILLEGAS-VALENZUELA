<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <script>
        function validarFormulario(){
            let nombre = document.forms["formRegistro"]["nombre"].value;
            let correo = document.forms["formRegistro"]["correo"].value;
            let password = document.forms["formRegistro"]["password"].value;

            if(nombre == "" || correo == "" || password == ""){
                alert("Todos los campos son obligatorios");
                return false;
            }
        }
    </script>
</head>
<body>

<h2>Registro de Usuario</h2>

<form name="formRegistro" action="../php/registro_usuario.php" method="POST" onsubmit="return validarFormulario()">

    <input type="text" name="nombre" placeholder="Nombre"><br><br>

    <input type="email" name="correo" placeholder="Correo"><br><br>

    <input type="password" name="password" placeholder="Contraseña"><br><br>

    <button type="submit">Registrar</button>

</form>

</body>
</html>
